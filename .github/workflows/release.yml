# Builds, checksums, and minisign-signs Denia release binaries, then publishes
# them as GitHub release assets. Consumed by `denia update` (ADR-029). Also
# publishes the single `denia` crate to crates.io (ADR-036).
#
# Trigger: push a tag `vX.Y.Z` whose X.Y.Z equals the Cargo.toml version.
#
# Required repo secret:
#   MINISIGN_SECRET_KEY  - the contents of a minisign secret key generated
#                          WITHOUT a password: `minisign -W -p key.pub -s key.sec`.
#                          The matching public key (line 2 of key.pub) must be
#                          pinned in src/cli/update.rs as MINISIGN_PUBKEY.
# Optional repo secret:
#   CARGO_REGISTRY_TOKEN - crates.io API token. When set, the publish-crates
#                          job runs `cargo publish` for `denia`; when unset, it
#                          skips (release of binaries is unaffected).
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: x86_64
            # Ubuntu 24.04 is the intentional glibc baseline (2.39+) for
            # signed release assets consumed by `denia update`.
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          # GitHub-hosted native ARM runner. If unavailable for this repo,
          # switch to `cross` or a QEMU build for aarch64.
          - arch: aarch64
            # Keep this aligned with the documented glibc 2.39+ host
            # requirement in README.md and ADR-029.
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          set -euo pipefail
          version="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}" >&2
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache the cargo registry + target/ across runs. Cold on the first
      # release after a 7-day GitHub cache eviction; otherwise reuses the
      # ~1200-dep build tree (pingora/boringssl/axum) and only recompiles the
      # denia crate. Keyed per target so x86_64 and aarch64 don't collide.
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # mold links the large release binary (boringssl + the embedded SPA)
      # noticeably faster than the default bfd linker, cold or warm.
      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold

      # corepack ships with the runner's preinstalled node, so activate pnpm
      # before setup-node — that lets setup-node's pnpm store cache resolve.
      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.25.0 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      # rust-embed bakes web/dist/client into the binary, so the SPA must exist
      # before cargo build (ADR-004).
      - name: Build web console
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build release binary
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact
        run: |
          install -Dm0755 \
            "target/${{ matrix.target }}/release/denia" \
            "dist/denia-${{ matrix.arch }}-linux-gnu"

      - uses: actions/upload-artifact@v4
        with:
          name: denia-${{ matrix.arch }}
          path: dist/denia-${{ matrix.arch }}-linux-gnu
          if-no-files-found: error

  # Cross-platform client binary for non-Linux developers. `denia` is a single
  # crate: on macOS/Windows the server modules + Linux deps are cfg'd out, so
  # `cargo build` yields a client-only `denia` with just auth/push/console
  # (ADR-037). No web console (rust-embed is Linux-gated) and no mold here.
  client:
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-14
            asset: denia-x86_64-apple-darwin
            ext: ""
          - target: aarch64-apple-darwin
            runner: macos-14
            asset: denia-aarch64-apple-darwin
            ext: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            asset: denia-x86_64-pc-windows-msvc.exe
            ext: ".exe"
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        # bash on every runner (incl. Windows Git Bash) so the staging script
        # below is identical across macOS and Windows.
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          set -euo pipefail
          version="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}" >&2
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build client binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/denia${{ matrix.ext }}" "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}" || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    needs: [build, client]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          # Server (linux-gnu) + client (apple-darwin / pc-windows-msvc) assets.
          find artifacts -type f -name 'denia-*' -exec cp {} dist/ \;
          ls -l dist

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          set -euo pipefail
          printf '# denia-release: %s\n' "${GITHUB_REF_NAME}" > SHA256SUMS
          sha256sum denia-* >> SHA256SUMS

      - name: Install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Sign SHA256SUMS
        working-directory: dist
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          # Key is password-less (generated with -W), so -S is non-interactive.
          minisign -S -s minisign.key -m SHA256SUMS -t "denia ${GITHUB_REF_NAME}"
          rm -f minisign.key
          test -f SHA256SUMS.minisig

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/denia-x86_64-linux-gnu
            dist/denia-aarch64-linux-gnu
            dist/denia-x86_64-apple-darwin
            dist/denia-aarch64-apple-darwin
            dist/denia-x86_64-pc-windows-msvc.exe
            dist/SHA256SUMS
            dist/SHA256SUMS.minisig
          fail_on_unmatched_files: true

  # Publish the single `denia` crate to crates.io. Runs only when
  # CARGO_REGISTRY_TOKEN is configured; otherwise it logs and skips so binary
  # releases are unaffected. The verify build needs the embedded SPA, so the
  # web console is built first and force-included via [package].include
  # (ADR-037). Gated behind the binary builds so a crate that fails to compile
  # on macOS/Windows is never published.
  publish-crates:
    needs: [build, client]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          set -euo pipefail
          version="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}" >&2
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.25.0 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      # rust-embed bakes web/dist/client into the crate; build it so the
      # published tarball (which force-includes web/dist/client) compiles.
      - name: Build web console
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Publish denia to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish."
            exit 0
          fi
          # --allow-dirty: the force-included web/dist/client is build output and
          # is gitignored, so cargo would otherwise refuse on untracked files.
          if cargo publish --allow-dirty 2>&1 | tee /tmp/publish.log; then
            echo "published."
          elif grep -qiE 'already (exists|uploaded)' /tmp/publish.log; then
            echo "version already on crates.io; treating as success."
          else
            echo "cargo publish failed" >&2
            exit 1
          fi
