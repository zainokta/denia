[package]
name = "denia"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
argon2 = "0.5.3"
async-trait = "0.1"
axum = "0.8"
chrono = { version = "0.4", features = ["serde"] }
cron = "0.16.0"
flate2 = "1.1.9"
hex = "0.4.3"
libc = "0.2"
oci-client = "0.17.0"
rand = "0.10.1"
rusqlite = { version = "0.39", features = ["bundled"] }
rust-embed = { version = "8", features = ["mime-guess"] }
rustix = { version = "1.1.4", features = ["fs", "mount", "pipe", "process", "thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11.0"
tar = "0.4.46"
thiserror = "2"
tokio = { version = "1", features = ["io-util", "macros", "net", "process", "rt-multi-thread", "signal", "time"] }
tower = "0.5"
uuid = { version = "1", features = ["serde", "v7"] }
zstd = "0.13.3"

[dev-dependencies]
http = "1"
tempfile = "3"
